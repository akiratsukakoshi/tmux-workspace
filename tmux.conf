# =============================================================================
# tmux.conf — managed by ~/tmux-workspace
#
# Symlinked from ~/.tmux.conf. Reload with `tmux source-file ~/.tmux.conf`.
# =============================================================================

# ---------- general ----------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# 0-indexed windows/panes so that pane references like `claude-parallel:0.0`
# match what `start.sh` produces.
set -g base-index 0
setw -g pane-base-index 0

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10

# ---------- status bar -------------------------------------------------------
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-justify left

set -g status-style "bg=colour236,fg=colour250"
set -g status-left-length 0
set -g status-right-length 200

# status-left is empty so the four pane status slots on the right have the
# entire bar width to themselves — useful in narrow vertical layouts where
# every column counts.
set -g status-left ""

# Right side: per-pane status strings written by Claude Code hooks into
# ~/.tmux-workspace-status/sN. `cat` is wrapped in a no-op fallback so a
# missing file does not break the status line.
set -g status-right "#(cat ~/.tmux-workspace-status/s1 2>/dev/null || echo '[1:-]') #(cat ~/.tmux-workspace-status/s2 2>/dev/null || echo '[2:-]') #(cat ~/.tmux-workspace-status/s3 2>/dev/null || echo '[3:-]') #(cat ~/.tmux-workspace-status/s4 2>/dev/null || echo '[4:-]') "

# ---------- pane borders + titles --------------------------------------------
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_title} "

set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour33,bold"

# Window list styling
setw -g window-status-current-style "bg=colour33,fg=colour231,bold"
setw -g window-status-style         "bg=colour236,fg=colour250"

# ---------- keybindings ------------------------------------------------------
# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# prefix + = → re-apply the tiled layout (forces all panes back to an even 2x2
# grid). Handy after manual resizes or when something looks off.
bind = select-layout tiled \; display-message "layout: tiled"
